[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "pip install fastapi uvicorn apify-client httpx aiohttp python-dotenv",
  "pip install git+https://github.com/zyndai/zyndai-python-sdk.git || true"
]

[start]
cmd = "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
